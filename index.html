<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Emoji Generator</title>
    <meta name="description" content="Generate GitHub-ready emojis from your images.">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h1 { color: #24292e; margin-bottom: 20px; }
        p { line-height: 1.6; margin-bottom: 25px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px 20px; border-radius: 6px; cursor: pointer; transition: border-color 0.3s ease; }
        .upload-area:hover { border-color: #0366d6; }
        input[type="file"] { display: none; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: background-color 0.3s ease; display: none; }
        button:hover { background-color: #218838; }
        .file-name { margin-top: 15px; font-weight: bold; color: #0366d6; display: block; }
        .loading { display: none; margin-top: 20px; color: #0366d6;}
         .price { font-size: 1.2em; font-weight: bold; color: #28a745; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Emoji Generator</h1>
        <p>Upload an image, and we'll transform it into a perfect set of GitHub-ready emojis (64x64px, square, optimized) in a downloadable ZIP.</p>
        <form id="uploadForm" enctype="multipart/form-data">
            <label for="fileInput" class="upload-area">
                <p>Drag & Drop your image here, or click to select</p>
                <input type="file" id="fileInput" name="image" accept="image/*">
            </label>
            <span class="file-name" id="selectedFileName">No file selected</span>
            <div class="loading" id="loadingIndicator">Processing your image...</div>
            <button type="submit" id="generateBtn">Generate Emojis for $<span id="displayPrice">9.99</span></button>
        </form>
        <p class="price">Only $<span id="finalPrice">9.99</span> for unlimited emoji generation from your image!</p>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const selectedFileName = document.getElementById('selectedFileName');
        const generateBtn = document.getElementById('generateBtn');
        const uploadForm = document.getElementById('uploadForm');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const priceDisplay = document.getElementById('displayPrice');
        const finalPriceDisplay = document.getElementById('finalPrice');
        
        const currentPrice = 9.99; // Placeholder for dynamic pricing if needed
        priceDisplay.textContent = currentPrice.toFixed(2);
        finalPriceDisplay.textContent = currentPrice.toFixed(2);

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                selectedFileName.textContent = `Selected: ${fileInput.files[0].name}`;
                generateBtn.style.display = 'block';
            } else {
                selectedFileName.textContent = 'No file selected';
                generateBtn.style.display = 'none';
            }
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                alert('Please select an image first.');
                return;
            }

            generateBtn.style.display = 'none';
            loadingIndicator.style.display = 'block';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            // In a real app, this would hit a backend API to process and initiate Stripe Checkout
            // For this HTML-only example, we'll simulate the process and tell the user to build the backend.
            await new Promise(resolve => setTimeout(resolve, 3000)); // Simulate processing time
            alert('Pretend this is where your backend processes the image and initiates Stripe Checkout! Your backend needs to do the image processing and ZIP generation.');
            
            loadingIndicator.style.display = 'none';
            generateBtn.style.display = 'block'; 
            selectedFileName.textContent = 'No file selected';
            fileInput.value = '';
        });
    </script>
</body>
</html>
